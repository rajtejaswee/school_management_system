<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🏫 School Management</h1>
    </header>

    <main>
      <section class="card">
        <h2>Add a New School</h2>
        <form id="addSchoolForm">
          <div class="form-group">
            <label for="schoolName">School Name</label>
            <input type="text" id="schoolName" required placeholder="Springfield Elementary" />
          </div>
          <div class="form-group">
            <label for="schoolAddress">Address</label>
            <input type="text" id="schoolAddress" required placeholder="123 Main St" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="schoolLat">Latitude</label>
              <input type="number" id="schoolLat" step="0.000001" required placeholder="28.6139" />
            </div>
            <div class="form-group">
              <label for="schoolLon">Longitude</label>
              <input type="number" id="schoolLon" step="0.000001" required placeholder="77.2090" />
            </div>
          </div>
          <button type="submit" id="addSubmitBtn">Add School</button>
          <div id="addMessage" class="message"></div>
        </form>
      </section>

      <section class="card">
        <h2>Find Nearby Schools</h2>
        <form id="searchSchoolsForm">
          <div class="form-row">
            <div class="form-group">
              <label for="userLat">Your Latitude</label>
              <input type="number" id="userLat" step="0.000001" required />
            </div>
            <div class="form-group">
              <label for="userLon">Your Longitude</label>
              <input type="number" id="userLon" step="0.000001" required />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="geoBtn" class="btn-secondary">Use My Location</button>
            <button type="submit" id="searchSubmitBtn">Search Schools</button>
          </div>
          <div id="searchMessage" class="message"></div>
        </form>
      </section>

      <section id="resultsSection" class="results-container">
        <!-- Schools will be rendered here -->
      </section>
    </main>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
